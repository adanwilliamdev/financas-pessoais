services:
  postgres:
    image: postgres:15-alpine
    container_name: financas-postgres
    environment:
      POSTGRES_DB: financas_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financas-network
    restart: unless-stopped

networks:
  financas-network:
    driver: bridge

volumes:
  postgres_data: